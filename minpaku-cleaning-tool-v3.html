<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>民泊清掃ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --text: #f0f0f0;
    --text2: #888;
    --danger: #f06060;
    --success: #60f09a;
    --warn: #f0c060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    padding-top: calc(12px + env(safe-area-inset-top, 0px));
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: grid; place-items: center; font-size: 16px; }
  .logo-text { font-size: 14px; font-weight: 700; }
  .logo-sub { font-size: 10px; color: var(--text2); }
  .progress-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: var(--text2); white-space: nowrap; }
  .progress-pill span { color: var(--accent); font-weight: 700; }

  /* BOTTOM NAV */
  .bottom-nav { background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 0px); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px; gap: 3px; cursor: pointer; transition: background 0.15s; }
  .nav-item:active { background: var(--surface2); }
  .nav-item.active .nav-icon, .nav-item.active .nav-label { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 9px; color: var(--text2); font-weight: 500; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* SECTION */
  .sec-title { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text2); margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
  .sec-title:first-child { margin-top: 0; }
  .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }

  /* FORM */
  label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; }
  input, textarea, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-family: inherit; font-size: 16px; transition: border-color 0.2s; outline: none; -webkit-appearance: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ROOM TABS */
  .room-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
  .room-tabs::-webkit-scrollbar { display: none; }
  .room-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .room-tab:active { transform: scale(0.95); }
  .room-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .room-tab.done { border-color: var(--success); color: var(--success); }
  .room-tab.done.active { background: var(--success); color: #000; border-color: var(--success); }
  .room-panel { display: none; }
  .room-panel.active { display: block; }

  /* CHECK ITEM */
  .check-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 12px; }
  .check-item.checked { border-color: rgba(96,240,154,0.3); background: rgba(96,240,154,0.04); }
  .check-item.warn-item { border-left: 3px solid var(--warn); }
  .check-box { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 7px; cursor: pointer; flex-shrink: 0; display: grid; place-items: center; transition: all 0.2s; margin-top: 1px; min-width: 26px; }
  .check-box.checked { background: var(--success); border-color: var(--success); }
  .check-box.checked::after { content: '✓'; font-size: 14px; color: #000; font-weight: 900; }
  .check-content { flex: 1; min-width: 0; }
  .check-label { font-weight: 600; font-size: 14px; line-height: 1.4; }
  .check-note { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .check-note.warn-note { color: var(--warn); }
  .check-status-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .status-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; font-family: inherit; cursor: pointer; transition: all 0.15s; font-weight: 600; }
  .status-btn:active { transform: scale(0.95); }
  .status-btn.active-ok { background: rgba(96,240,154,0.2); border-color: var(--success); color: var(--success); }
  .status-btn.active-ng { background: rgba(240,96,96,0.2); border-color: var(--danger); color: var(--danger); }
  .status-btn.active-skip { background: rgba(136,136,136,0.2); border-color: #666; color: #aaa; }

  /* PROGRESS */
  .progress-bar { background: var(--border); border-radius: 4px; height: 4px; margin: 8px 0 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s ease; }
  .progress-text { font-size: 11px; color: var(--text2); text-align: right; margin-bottom: 12px; }

  /* PHOTOS */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .photo-wrap { display: flex; flex-direction: column; gap: 4px; }
  .photo-slot { aspect-ratio: 1; border: 2px dashed var(--border); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: var(--surface2); }
  .photo-slot:active { border-color: var(--accent); }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
  .photo-slot-icon { font-size: 22px; }
  .photo-slot-text { font-size: 9px; color: var(--text2); margin-top: 3px; }
  .photo-remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: rgba(0,0,0,0.75); border-radius: 50%; display: grid; place-items: center; font-size: 11px; color: white; z-index: 2; border: none; cursor: pointer; }
  .photo-label-inp { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 5px 8px; width: 100%; font-family: inherit; outline: none; }
  .photo-label-inp:focus { border-color: var(--accent); }
  .photo-label-inp:disabled { opacity: 0.3; }

  /* BILLING */
  .bill-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .bill-item-name { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-size: 15px; font-family: inherit; padding: 4px 0; margin-bottom: 8px; outline: none; }
  .bill-item-name:focus { border-color: var(--accent); }
  .bill-item-row { display: flex; gap: 8px; align-items: center; }
  .bill-num-inp { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; font-family: inherit; padding: 8px; text-align: center; outline: none; width: 56px; flex-shrink: 0; }
  .bill-price-inp { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; font-family: inherit; padding: 8px; outline: none; flex: 1; }
  .bill-num-inp:focus, .bill-price-inp:focus { border-color: var(--accent); }
  .bill-amount { font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; min-width: 70px; text-align: right; }
  .bill-del-btn { background: transparent; border: none; color: var(--danger); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .bill-unit-label { font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .add-btn { width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--border); border-radius: 10px; color: var(--text2); cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
  .add-btn:active { border-color: var(--accent); color: var(--accent); }
  .total-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-top: 12px; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .total-row + .total-row { border-top: 1px solid var(--border); }
  .total-label { font-size: 13px; color: var(--text2); }
  .total-val { font-size: 14px; }
  .total-final { padding-top: 10px; margin-top: 4px; border-top: 2px solid var(--border) !important; }
  .total-final .total-label { font-weight: 700; font-size: 14px; color: var(--text); }
  .total-final .total-val { font-size: 22px; font-weight: 700; color: var(--accent); }

  /* BUTTONS */
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 700; font-family: inherit; transition: all 0.15s; width: 100%; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn + .btn { margin-top: 8px; }

  /* PREVIEW */
  .preview-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .prev-btn { flex: 1; padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .prev-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.08); }
  .preview-scroll { background: white; border-radius: 12px; overflow: auto; max-height: 50vh; -webkit-overflow-scrolling: touch; }
  .preview-inner { padding: 20px; color: #1a1a1a; font-size: 12px; }
  .pv-header { border-bottom: 2px solid #1a1a1a; padding-bottom: 12px; margin-bottom: 16px; }
  .pv-title { font-size: 20px; font-weight: 900; }
  .pv-meta { font-size: 11px; color: #666; margin-top: 4px; line-height: 1.7; }
  .pv-sec { margin-bottom: 16px; }
  .pv-sec-title { font-size: 10px; font-weight: 700; background: #1a1a1a; color: white; padding: 3px 10px; border-radius: 4px; display: inline-block; margin-bottom: 8px; letter-spacing: 0.08em; }
  .pv-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .pv-table th { background: #f5f5f5; padding: 5px 8px; text-align: left; border: 1px solid #e0e0e0; font-size: 10px; color: #555; }
  .pv-table td { padding: 5px 8px; border: 1px solid #e0e0e0; }
  .pv-photo { width: 80px; height: 65px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; }

  /* CHIP */
  .chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(96,200,240,0.1); color: var(--accent2); font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(96,200,240,0.2); margin-bottom: 12px; }

  /* TOAST */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--accent); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: all 0.3s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* LOADING */
  .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: grid; place-items: center; z-index: 9999; display: none; }
  .loading-overlay.show { display: grid; }
  .loading-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🏠</div>
    <div>
      <div class="logo-text">民泊清掃ツール</div>
      <div class="logo-sub">CLEANING REPORT</div>
    </div>
  </div>
  <div class="progress-pill"><span id="hdrDone">0</span>/<span id="hdrTotal">0</span> 完了</div>
</div>

<div class="main">

  <!-- TAB 0: 基本情報 -->
  <div class="panel active" id="panel-0">
    <div class="sec-title">清掃情報</div>
    <div class="card">
      <div class="form-group">
        <label>物件名</label>
        <input type="text" id="propertyName" placeholder="例: 古民家〇〇">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>清掃日</label>
          <input type="date" id="cleaningDate">
        </div>
        <div class="form-group">
          <label>スタッフ名</label>
          <input type="text" id="staffName" placeholder="例: 田中 花子">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>開始時刻</label>
          <input type="time" id="startTime">
        </div>
        <div class="form-group">
          <label>終了時刻</label>
          <input type="time" id="endTime">
        </div>
      </div>
    </div>
    <div class="sec-title">依頼者情報</div>
    <div class="card">
      <div class="form-group">
        <label>依頼者名 / 会社名</label>
        <input type="text" id="clientName" placeholder="例: 山田 一郎">
      </div>
      <div class="form-group">
        <label>請求書宛名</label>
        <input type="text" id="invoiceTo" placeholder="例: 山田 一郎 様">
      </div>
      <div class="form-group">
        <label>自社名（清掃業者）</label>
        <input type="text" id="companyName" placeholder="例: クリーンサービス鈴木">
      </div>
    </div>
    <div class="sec-title">特記事項</div>
    <div class="card">
      <div class="form-group" style="margin-bottom:0;">
        <label>気になった点・引き継ぎ</label>
        <textarea id="notes" placeholder="例: 排水溝の汚れが強め。調味料のしょうゆが残り少ない。"></textarea>
      </div>
    </div>
  </div>

  <!-- TAB 1: チェックリスト（部屋別） -->
  <div class="panel" id="panel-1">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 0 完了</div>
    <div class="room-tabs" id="roomTabs"></div>
    <div id="roomPanels"></div>
  </div>

  <!-- TAB 2: 写真（15枚） -->
  <div class="panel" id="panel-2">
    <div class="chip">📷 清掃後の写真を記録（最大15枚）</div>
    <div class="card">
      <div class="photo-grid" id="photoGrid"></div>
    </div>
  </div>

  <!-- TAB 3: 請求 -->
  <div class="panel" id="panel-3">
    <div class="sec-title">請求明細</div>
    <div id="billingList"></div>
    <button class="add-btn" onclick="addBillingItem()">＋ 項目を追加</button>
    <div class="total-box">
      <div class="total-row"><div class="total-label">小計</div><div class="total-val" id="subtotalDisplay">¥0</div></div>
      <div class="total-row"><div class="total-label">消費税（10%）</div><div class="total-val" id="taxDisplay">¥0</div></div>
      <div class="total-row total-final"><div class="total-label">合計（税込）</div><div class="total-val" id="totalDisplay">¥0</div></div>
    </div>
    <div class="sec-title" style="margin-top:16px;">振込先</div>
    <div class="card">
      <div class="form-group">
        <label>銀行・支店名</label>
        <input type="text" id="bankName" placeholder="例: 〇〇銀行 渋谷支店">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>口座番号</label>
          <input type="text" id="bankAccount" placeholder="普通 1234567">
        </div>
        <div class="form-group">
          <label>口座名義</label>
          <input type="text" id="bankHolder" placeholder="スズキ ハナコ">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>支払期限</label>
          <input type="date" id="paymentDue">
        </div>
        <div class="form-group">
          <label>請求書番号</label>
          <input type="text" id="invoiceNo">
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 4: 出力 -->
  <div class="panel" id="panel-4">
    <div class="preview-toggle">
      <button class="prev-btn active" id="prevR" onclick="renderPreview('report')">📋 報告書</button>
      <button class="prev-btn" id="prevI" onclick="renderPreview('invoice')">🧾 請求書</button>
    </div>
    <div class="preview-scroll">
      <div class="preview-inner" id="previewArea">
        <div style="color:#aaa;text-align:center;padding:40px 0;">読み込み中...</div>
      </div>
    </div>
    <div style="margin-top:12px;">
      <button class="btn btn-primary" onclick="downloadPDF('report')">⬇️ 報告書 PDF 出力</button>
      <button class="btn btn-secondary" onclick="downloadPDF('invoice')">⬇️ 請求書 PDF 出力</button>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab(0)" id="nav0"><div class="nav-icon">📝</div><div class="nav-label">基本情報</div></div>
  <div class="nav-item" onclick="switchTab(1)" id="nav1"><div class="nav-icon">✅</div><div class="nav-label">チェック</div></div>
  <div class="nav-item" onclick="switchTab(2)" id="nav2"><div class="nav-icon">📷</div><div class="nav-label">写真</div></div>
  <div class="nav-item" onclick="switchTab(3)" id="nav3"><div class="nav-icon">💴</div><div class="nav-label">請求</div></div>
  <div class="nav-item" onclick="switchTab(4)" id="nav4"><div class="nav-icon">📤</div><div class="nav-label">出力</div></div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div style="color:var(--text);font-weight:700;">PDF生成中...</div>
    <div style="color:var(--text2);font-size:12px;margin-top:4px;">しばらくお待ちください</div>
  </div>
</div>
<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(event)">

<script>
// ============================================================
// チェックリストデータ
// ============================================================
const CHECKLIST = [
  { id:'genkan', area:'玄関', emoji:'🚪', items:[
    { id:'g1', label:'入り口のゴミ拾い', note:'入り口にゴミがあったら拾う' },
    { id:'g2', label:'玄関を掃く', note:'◎履く' },
    { id:'g3', label:'スリッパを並べる', note:'◎スリッパ並べる' },
    { id:'g4', label:'飾り物の確認・撮影', note:'⚠️ 無くなっているものがないか確認・写真撮影', warn:true },
  ]},
  { id:'kitchen1', area:'キッチン①', emoji:'🍳', items:[
    { id:'k1', label:'冷蔵庫：残り物を捨てる', note:'◎残り物捨てる' },
    { id:'k2', label:'冷蔵庫：汚れがあれば拭く', note:'◎汚れあれば拭く' },
    { id:'k3', label:'電磁レンジ：汚れを拭く', note:'◎汚れあれば拭く' },
    { id:'k4', label:'トースター：汚れを拭く', note:'◎汚れあれば拭く' },
    { id:'k5', label:'トースター：アルミホイルでカバー', note:'◎アルミホイルでカバー' },
    { id:'k6', label:'調味料：切れそうな時補充', note:'⚠️ ストック無くなりそうなとき連絡', warn:true },
  ]},

function buildRoomTabs() {
  const tabsEl = document.getElementById('roomTabs');
  const panelsEl = document.getElementById('roomPanels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';

  CHECKLIST.forEach((section, idx) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'room-tab' + (idx===0?' active':'');
    btn.id = 'rtab-' + section.id;
    btn.innerHTML = `${section.emoji} ${section.area}`;
    btn.onclick = () => switchRoom(idx);
    tabsEl.appendChild(btn);

    // Room panel
    const panel = document.createElement('div');
    panel.className = 'room-panel' + (idx===0?' active':'');
    panel.id = 'rpanel-' + section.id;

    section.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'check-item' + (item.warn?' warn-item':'');
      div.id = 'ci-' + item.id;
      div.innerHTML = `
        <div class="check-box ${state.checks[item.id]?.done?'checked':''}" onclick="toggleCheck('${item.id}',this)" id="cb-${item.id}"></div>
        <div class="check-content">
          <div class="check-label">${item.label}</div>
          <div class="check-note ${item.warn?'warn-note':''}">${item.warn?'⚠️':'📌'} ${item.note}</div>
          <div class="check-status-row">
            <button class="status-btn ${state.checks[item.id]?.status==='ok'?'active-ok':''}" onclick="setStatus('${item.id}','ok',this)">✅ OK</button>
            <button class="status-btn ${state.checks[item.id]?.status==='ng'?'active-ng':''}" onclick="setStatus('${item.id}','ng',this)">⚠️ 要注意</button>
            <button class="status-btn ${state.checks[item.id]?.status==='skip'?'active-skip':''}" onclick="setStatus('${item.id}','skip',this)">— 対象外</button>
          </div>
        </div>
      `;
      panel.appendChild(div);
    });
    panelsEl.appendChild(panel);
  });
}

function switchRoom(idx) {
  state.currentRoom = idx;
  document.querySelectorAll('.room-tab').forEach((t,i) => {
    t.classList.toggle('active', i===idx);
  });
  document.querySelectorAll('.room-panel').forEach((p,i) => {
    p.classList.toggle('active', i===idx);
  });
  document.querySelector('.main').scrollTop = 0;
}

function toggleCheck(id, box) {
  if(!state.checks[id]) state.checks[id] = {};
  state.checks[id].done = !state.checks[id].done;
  box.classList.toggle('checked', state.checks[id].done);
  updateProgress();
  updateRoomTabStatus();
}

function setStatus(id, val, btn) {
  if(!state.checks[id]) state.checks[id] = {};
  const prev = state.checks[id].status;
  state.checks[id].status = prev===val ? '' : val;
  if(state.checks[id].status) {
    state.checks[id].done = true;
    document.getElementById('cb-'+id)?.classList.add('checked');
  }
  const row = btn.closest('.check-status-row');
  row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active-ok','active-ng','active-skip'));
  if(state.checks[id].status==='ok') row.querySelectorAll('.status-btn')[0].classList.add('active-ok');
  if(state.checks[id].status==='ng') row.querySelectorAll('.status-btn')[1].classList.add('active-ng');
  if(state.checks[id].status==='skip') row.querySelectorAll('.status-btn')[2].classList.add('active-skip');
  updateProgress();
  updateRoomTabStatus();
}

function updateProgress() {
  let total=0, done=0;
  CHECKLIST.forEach(s => s.items.forEach(item => {
    total++;
    if(state.checks[item.id]?.done || state.checks[item.id]?.status) done++;
  }));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${done} / ${total} 完了 (${pct}%)`;
  document.getElementById('hdrDone').textContent = done;
  document.getElementById('hdrTotal').textContent = total;
}

function updateRoomTabStatus() {
  CHECKLIST.forEach((s, idx) => {
    let done=0;
    s.items.forEach(item => { if(state.checks[item.id]?.done || state.checks[item.id]?.status) done++; });
    const tab = document.getElementById('rtab-'+s.id);
    if(tab) {
      tab.classList.toggle('done', done===s.items.length);
    }
  });
}

function buildPhotoGrid() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  for(let i=0;i<15;i++){
    const wrap = document.createElement('div');
    wrap.className = 'photo-wrap';
    const p = state.photos[i];
    if(p){
      const slot = document.createElement('div');
      slot.className = 'photo-slot';
      slot.innerHTML = `<img src="${p.dataUrl}"><button class="photo-remove" onclick="removePhoto(${i},event)">✕</button>`;
      const inp = document.createElement('input');
      inp.className = 'photo-label-inp';
      inp.placeholder = `ラベル ${i+1}`;
      inp.value = p.label||'';
      inp.oninput = e => { if(state.photos[i]) state.photos[i].label = e.target.value; };
      wrap.appendChild(slot);
      wrap.appendChild(inp);
    } else {
      const slot = document.createElement('div');
      slot.className = 'photo-slot';
      slot.innerHTML = `<div class="photo-slot-icon">📷</div><div class="photo-slot-text">${i+1}</div>`;
      slot.onclick = () => { state.currentPhotoSlot=i; document.getElementById('photoInput').click(); };
      const inp = document.createElement('input');
      inp.className = 'photo-label-inp';
      inp.placeholder = `ラベル ${i+1}`;
      inp.disabled = true;
      wrap.appendChild(slot);
      wrap.appendChild(inp);
    }
    grid.appendChild(wrap);
  }
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if(!file) return;
  // 画像をリサイズしてからbase64に変換
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if(w > MAX || h > MAX) {
        if(w > h) { h = Math.round(h*MAX/w); w = MAX; }
        else { w = Math.round(w*MAX/h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      state.photos[state.currentPhotoSlot] = { dataUrl: canvas.toDataURL('image/jpeg', 0.7), label:'' };
      buildPhotoGrid();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removePhoto(i, e) {
  e.stopPropagation();
  state.photos[i] = null;
  buildPhotoGrid();
}

function buildBillingList() {
  const list = document.getElementById('billingList');

    const div = document.createElement('div');
    div.className = 'bill-item';
    div.innerHTML = `
      <input class="bill-item-name" type="text" value="${item.name}" placeholder="項目名" onchange="updateBilling(${i},'name',this.value)">

        <input class="bill-price-inp" type="number" min="0" value="${item.price}" onchange="updateBilling(${i},'price',this.value)">
        <span class="bill-amount" id="ba-${i}">¥${(item.qty*item.price).toLocaleString()}</span>

function updateBilling(i, key, val) {
  state.billing[i][key] = key==='name' ? val : Number(val);
  const el = document.getElementById('ba-'+i);
  if(el) el.textContent = '¥'+(state.billing[i].qty*state.billing[i].price).toLocaleString();
  updateBillingTotal();
}
function addBillingItem() { state.billing.push({name:'',qty:1,price:0}); buildBillingList(); }
function removeBilling(i) { state.billing.splice(i,1); buildBillingList(); }
function updateBillingTotal() {
  const sub = state.billing.reduce((a,b)=>a+b.qty*b.price,0);
  const tax = Math.round(sub*0.1);
  const total = sub+tax;
  document.getElementById('subtotalDisplay').textContent='¥'+sub.toLocaleString();
  document.getElementById('taxDisplay').textContent='¥'+tax.toLocaleString();
  document.getElementById('totalDisplay').textContent='¥'+total.toLocaleString();
  return {sub,tax,total};
}

  document.getElementById('loadingOverlay').classList.add('show');

  try {
    const isReport = type === 'report';
    const {sub, tax, total} = updateBillingTotal();

    // Canvas描画でPDF生成（日本語文字化け回避）
    const A4_W = 794, A4_H = 1123;
    const canvas = document.createElement('canvas');
    canvas.width = A4_W;
    canvas.height = A4_H * 3; // 最大3ページ分
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const margin = 48;
    let y = margin;

    // フォント設定
    const fontBody = '14px "Noto Sans JP", sans-serif';
    const fontBold = 'bold 14px "Noto Sans JP", sans-serif';
    const fontLarge = 'bold 28px "Noto Sans JP", sans-serif';
    const fontSmall = '12px "Noto Sans JP", sans-serif';
    const fontTiny = '11px "Noto Sans JP", sans-serif';

    // タイトル
    ctx.fillStyle = '#1a1a1a';
    ctx.font = fontLarge;
    ctx.fillText(isReport ? '清掃業務報告書' : '請求書', margin, y + 28);
    y += 44;

    // メタ情報
    ctx.font = fontSmall;
    ctx.fillStyle = '#666';
    if(isReport){
      ctx.fillText(`物件: ${g('propertyName')}　清掃日: ${g('cleaningDate')}　スタッフ: ${g('staffName')}　時間: ${g('startTime')}〜${g('endTime')}`, margin, y);
    } else {
      ctx.fillText(`${g('invoiceNo')}　発行日: ${new Date().toLocaleDateString('ja-JP')}　支払期限: ${g('paymentDue')}`, margin, y);
    }
    y += 8;

    // 区切り線
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(A4_W - margin, y); ctx.stroke();
    y += 20;

    if(isReport){
      // チェックリスト
      for(const section of CHECKLIST){
        // エリアヘッダー
        if(y > A4_H * 2.8) break;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(margin, y - 14, A4_W - margin*2, 22);
        ctx.fillStyle = '#ffffff';
        ctx.font = fontBold;
        ctx.fillText(`${section.emoji} ${section.area}`, margin + 8, y + 2);
        y += 26;

        for(const item of section.items){
          if(y > A4_H * 2.85) break;
          const c = state.checks[item.id];
          const st = c?.status==='ok'?'✅' : c?.status==='ng'?'⚠️' : c?.status==='skip'?'—' : c?.done?'✅' : '□';
          ctx.fillStyle = item.warn ? '#fff8e8' : '#f9f9f9';
          ctx.fillRect(margin, y - 13, A4_W - margin*2, 20);
          ctx.strokeStyle = '#e0e0e0';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(margin, y - 13, A4_W - margin*2, 20);
          ctx.fillStyle = '#1a1a1a';
          ctx.font = fontTiny;
          ctx.fillText(st, margin + 6, y + 1);
          ctx.fillText(item.label, margin + 28, y + 1);
          if(c?.status==='ng'){
            ctx.fillStyle = '#e53935';
            ctx.fillText('要注意', A4_W - margin - 50, y + 1);
          }
          y += 22;
        }
        y += 4;
      }

      // 写真
      const validPhotos = state.photos.filter(Boolean);
      if(validPhotos.length > 0 && y < A4_H * 2.7){
        y += 10;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(margin, y - 14, A4_W - margin*2, 22);
        ctx.fillStyle = '#ffffff';
        ctx.font = fontBold;
        ctx.fillText('報告写真', margin + 8, y + 2);
        y += 28;

        const PW = 150, PH = 120, GAP = 12;
        let px = margin;
        for(const p of validPhotos){
          if(px + PW > A4_W - margin){ px = margin; y += PH + 24; }
          if(y + PH > A4_H * 2.9) break;
          const img = new Image();
          img.src = p.dataUrl;
          try { ctx.drawImage(img, px, y, PW, PH); } catch(e){}
          if(p.label){
            ctx.fillStyle = '#555';
            ctx.font = fontTiny;
            ctx.fillText(p.label, px, y + PH + 14);
          }
          px += PW + GAP;
        }
        y += PH + 30;
      }

      // 特記事項
      if(g('notes') && y < A4_H * 2.85){
        y += 10;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(margin, y - 14, A4_W - margin*2, 22);
        ctx.fillStyle = '#ffffff';
        ctx.font = fontBold;
        ctx.fillText('特記事項', margin + 8, y + 2);
        y += 26;
        ctx.fillStyle = '#f5f5f5';
        ctx.fillRect(margin, y, A4_W - margin*2, 60);
        ctx.fillStyle = '#1a1a1a';
        ctx.font = fontSmall;
        // テキスト折り返し
        const words = g('notes');
        const maxW = A4_W - margin*2 - 16;
        let line = '';
        let lineY = y + 16;
        for(let i=0;i<words.length;i++){
          const testLine = line + words[i];
          if(ctx.measureText(testLine).width > maxW && i > 0){
            ctx.fillText(line, margin + 8, lineY);
            line = words[i];
            lineY += 18;
          } else { line = testLine; }
        }
        if(line) ctx.fillText(line, margin + 8, lineY);
      }

    } else {
      // 請求書
      ctx.fillStyle = '#1a1a1a';
      ctx.font = 'bold 18px "Noto Sans JP", sans-serif';
      ctx.fillText((g('invoiceTo')||g('clientName')) + ' 御中', margin, y);
      y += 28;
      ctx.font = fontSmall;
      ctx.fillStyle = '#555';
      ctx.fillText(`件名: ${g('propertyName')} 清掃業務（${g('cleaningDate')}）`, margin, y);
      y += 24;

      // 明細テーブルヘッダー
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(margin, y, A4_W - margin*2, 28);
      ctx.fillStyle = '#ffffff';
      ctx.font = fontBold;
      ctx.fillText('項目', margin + 8, y + 18);
      ctx.fillText('数量', A4_W - margin - 320, y + 18);
      ctx.fillText('単価', A4_W - margin - 220, y + 18);
      ctx.fillText('金額', A4_W - margin - 100, y + 18);
      y += 36;

      for(const item of state.billing){
        ctx.fillStyle = '#f9f9f9';
        ctx.fillRect(margin, y - 16, A4_W - margin*2, 26);
        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(margin, y - 16, A4_W - margin*2, 26);
        ctx.fillStyle = '#1a1a1a';
        ctx.font = fontBody;
        ctx.fillText(item.name, margin + 8, y + 2);
        ctx.fillText(String(item.qty), A4_W - margin - 310, y + 2);
        ctx.fillText('¥' + item.price.toLocaleString(), A4_W - margin - 210, y + 2);
        ctx.fillText('¥' + (item.qty*item.price).toLocaleString(), A4_W - margin - 90, y + 2);
        y += 28;
      }

      y += 16;
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(A4_W - margin - 300, y); ctx.lineTo(A4_W - margin, y); ctx.stroke();
      y += 12;

      ctx.font = fontSmall; ctx.fillStyle = '#666';
      ctx.fillText('小計', A4_W - margin - 200, y);
      ctx.fillText('¥' + sub.toLocaleString(), A4_W - margin - 60, y);
      y += 22;
      ctx.fillText('消費税（10%）', A4_W - margin - 200, y);
      ctx.fillText('¥' + tax.toLocaleString(), A4_W - margin - 60, y);
      y += 10;

      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(A4_W - margin - 300, y); ctx.lineTo(A4_W - margin, y); ctx.stroke();
      y += 20;

      ctx.fillStyle = '#1a1a1a';
      ctx.font = 'bold 22px "Noto Sans JP", sans-serif';
      ctx.fillText('合計（税込）', A4_W - margin - 280, y);
      ctx.font = 'bold 26px "Noto Sans JP", sans-serif';
      ctx.fillStyle = '#2e7d32';
      ctx.fillText('¥' + total.toLocaleString(), A4_W - margin - 120, y);
      y += 40;

      if(g('bankName')){
        ctx.fillStyle = '#f5f5f5';
        ctx.fillRect(margin, y, A4_W - margin*2, 80);
        ctx.fillStyle = '#1a1a1a';
        ctx.font = fontBold;
        ctx.fillText('【振込先】', margin + 12, y + 20);
        ctx.font = fontBody;
        ctx.fillText(g('bankName'), margin + 12, y + 38);
        ctx.fillText('口座番号: ' + g('bankAccount'), margin + 12, y + 56);
        ctx.fillText('口座名義: ' + g('bankHolder'), margin + 12, y + 74);
      }
    }

    // Canvasを実際の内容に合わせてトリミング
    const actualH = Math.min(y + 80, A4_H * 3);
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = A4_W;
    finalCanvas.height = actualH;
    finalCanvas.getContext('2d').drawImage(canvas, 0, 0);

    // PDF生成
    const imgData = finalCanvas.toDataURL('image/jpeg', 0.95);
    const pagesNeeded = Math.ceil(actualH / A4_H);

    // jsPDFをCDNから読み込み
    if(!window.jspdf){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'p', unit:'pt', format:'a4' });
    const pdfW = doc.internal.pageSize.getWidth();
    const pdfH = doc.internal.pageSize.getHeight();

    for(let page=0; page<pagesNeeded; page++){
      if(page > 0) doc.addPage();
      // 各ページ分のCanvasを切り出し
      const pageCanvas = document.createElement('canvas');
      pageCanvas.width = A4_W;
      pageCanvas.height = A4_H;
      const pageCtx = pageCanvas.getContext('2d');
      pageCtx.fillStyle = '#ffffff';
      pageCtx.fillRect(0,0,A4_W,A4_H);
      pageCtx.drawImage(finalCanvas, 0, page*A4_H, A4_W, A4_H, 0, 0, A4_W, A4_H);
      const pageImg = pageCanvas.toDataURL('image/jpeg', 0.95);
      doc.addImage(pageImg, 'JPEG', 0, 0, pdfW, pdfH);
    }

    const fname = isReport
      ? `清掃報告書_${g('propertyName')}_${g('cleaningDate')}.pdf`
      : `請求書_${g('propertyName')}_${g('cleaningDate')}.pdf`;
    doc.save(fname);
    showToast('✅ PDFを保存しました');

  } catch(err) {
    console.error(err);
    showToast('❌ エラーが発生しました');
  }

  document.getElementById('loadingOverlay').classList.remove('show');
}

function loadScript(src){
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
